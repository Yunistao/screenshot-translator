<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Translator Test</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background-color: #f5f5f5;
      }

      .app-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background-color: white;
        min-height: 100vh;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }

      .app-header h1 {
        margin: 0;
        color: #333;
      }

      .app-controls {
        display: flex;
        gap: 10px;
      }

      .app-controls button {
        padding: 8px 16px;
        background-color: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
      }

      .app-controls button.active {
        background-color: #4CAF50;
        color: white;
      }

      .screenshot-tool {
        margin-bottom: 30px;
        text-align: center;
      }

      .screenshot-tool button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 4px;
      }

      .screenshot-tool button:hover {
        background-color: #45a049;
      }

      .screenshot-tool button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }

      .processing-indicator {
        margin: 10px 0;
        padding: 10px;
        background-color: #e3f2fd;
        border: 1px solid #2196f3;
        border-radius: 4px;
        color: #0d47a1;
      }

      .screenshot-preview {
        margin-top: 20px;
      }

      .screenshot-preview img {
        max-width: 100%;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .result-container {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background-color: #f9f9f9;
      }

      .result-actions {
        margin-bottom: 15px;
        text-align: right;
      }

      .result-actions button {
        padding: 8px 16px;
        background-color: #2196F3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .result-actions button:hover {
        background-color: #0b7dda;
      }

      .ocr-section, .translation-section {
        margin-bottom: 20px;
      }

      .ocr-section h2, .translation-section h2 {
        margin-top: 0;
        color: #333;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }

      .ocr-section p, .translation-section p {
        background-color: white;
        padding: 15px;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>截图翻译工具</h1>
        <div class="app-controls">
          <button>显示历史记录</button>
          <button>显示设置</button>
        </div>
      </header>

      <div class="screenshot-tool">
        <div class="button-group">
          <button id="screenshot-btn">开始截图 (Alt+S)</button>
        </div>

        <div id="processing-indicator" style="display: none;">
          <div class="progress-text"></div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 0%"></div>
          </div>
          <div class="progress-percentage">0%</div>
        </div>

        <div id="error-message" style="display: none;">
          <span id="error-text"></span>
          <button id="error-close">×</button>
        </div>

        <div id="screenshot-preview" style="display: none;">
          <h3>开始截图:</h3>
          <img id="screenshot-img" src="" alt="Screenshot preview" />
        </div>
      </div>

      <div id="result-container" style="display: none;">
        <div class="result-actions">
          <button>重新显示</button>
        </div>

        <div id="ocr-section" style="display: none;">
          <h2>OCR 识别结果:</h2>
          <p id="ocr-text"></p>
        </div>

        <div id="translation-section" style="display: none;">
          <h2>翻译结果:</h2>
          <p id="translated-text"></p>
        </div>
      </div>
    </div>

    <script>
      // 模拟状态
      let isLoading = false;
      let isSelecting = false;
      let processingProgress = '';
      let progressPercentage = 0;
      let errorMessage = null;
      let screenshot = null;
      let ocrText = null;
      let translatedText = null;

      // DOM 元素
      const screenshotBtn = document.getElementById('screenshot-btn');
      const processingIndicator = document.getElementById('processing-indicator');
      const progressText = processingIndicator.querySelector('.progress-text');
      const progressBar = processingIndicator.querySelector('.progress-bar');
      const progressPercentageEl = processingIndicator.querySelector('.progress-percentage');
      const errorMessageEl = document.getElementById('error-message');
      const errorText = errorMessageEl.querySelector('#error-text');
      const errorClose = errorMessageEl.querySelector('#error-close');
      const screenshotPreview = document.getElementById('screenshot-preview');
      const screenshotImg = screenshotPreview.querySelector('#screenshot-img');
      const resultContainer = document.getElementById('result-container');
      const ocrSection = document.getElementById('ocr-section');
      const ocrTextEl = ocrSection.querySelector('#ocr-text');
      const translationSection = document.getElementById('translation-section');
      const translatedTextEl = translationSection.querySelector('#translated-text');

      // 清除错误信息
      const clearError = () => {
        errorMessage = null;
        errorMessageEl.style.display = 'none';
      };

      // 模拟截图功能
      const captureScreenshotFromMain = async () => {
        // 清除之前的错误
        clearError();
        
        try {
          isLoading = true;
          isSelecting = true;
          processingProgress = '正在获取截图...';
          progressPercentage = 0;
          updateUI();

          // 模拟截图延迟
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // 模拟截图数据
          const screenshotData = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
          screenshot = screenshotData;

          processingProgress = '正在执行OCR识别...';
          progressPercentage = 40;
          updateUI();

          // 模拟OCR识别
          await new Promise(resolve => setTimeout(resolve, 1000));
          ocrText = '这是一段测试文本，用于模拟OCR识别结果。';

          processingProgress = '正在翻译文本...';
          progressPercentage = 70;
          updateUI();

          // 模拟翻译
          await new Promise(resolve => setTimeout(resolve, 1000));
          translatedText = 'This is a test text used to simulate OCR recognition results.';

          processingProgress = '处理完成！';
          progressPercentage = 100;
          updateUI();
          
          // 延迟清除进度信息，让用户看到完成状态
          setTimeout(() => {
            processingProgress = '';
            progressPercentage = 0;
            isLoading = false;
            isSelecting = false;
            updateUI();
          }, 1000);
          
        } catch (error) {
          console.error('截图或处理失败:', error);
          processingProgress = '';
          progressPercentage = 0;
          isLoading = false;
          isSelecting = false;
          
          // 显示友好的错误信息
          errorMessage = error instanceof Error ? error.message : '截图失败，请重试';
          updateUI();
          
          // 3秒后自动清除错误信息
          setTimeout(clearError, 3000);
        }
      };

      // 取消截图操作
      const cancelScreenshot = () => {
        isLoading = false;
        isSelecting = false;
        processingProgress = '';
        progressPercentage = 0;
        errorMessage = '操作已取消';
        updateUI();
        setTimeout(clearError, 2000);
      };

      // 更新UI
      const updateUI = () => {
        // 更新按钮状态
        screenshotBtn.disabled = isSelecting || isLoading;
        screenshotBtn.textContent = isLoading ? '处理中...' : isSelecting ? '选择截图区域...' : '开始截图 (Alt+S)';

        // 更新处理指示器
        if (processingProgress) {
          processingIndicator.style.display = 'block';
          progressText.textContent = processingProgress;
          progressBar.style.width = `${progressPercentage}%`;
          progressPercentageEl.textContent = `${progressPercentage}%`;
        } else {
          processingIndicator.style.display = 'none';
        }

        // 更新错误信息
        if (errorMessage) {
          errorMessageEl.style.display = 'block';
          errorText.textContent = errorMessage;
        } else {
          errorMessageEl.style.display = 'none';
        }

        // 更新截图预览
        if (screenshot) {
          screenshotPreview.style.display = 'block';
          screenshotImg.src = screenshot;
        } else {
          screenshotPreview.style.display = 'none';
        }

        // 更新结果容器
        if (ocrText || translatedText) {
          resultContainer.style.display = 'block';

          if (ocrText) {
            ocrSection.style.display = 'block';
            ocrTextEl.textContent = ocrText;
          } else {
            ocrSection.style.display = 'none';
          }

          if (translatedText) {
            translationSection.style.display = 'block';
            translatedTextEl.textContent = translatedText;
          } else {
            translationSection.style.display = 'none';
          }
        } else {
          resultContainer.style.display = 'none';
        }
      };

      // 注册键盘事件处理器
      window.addEventListener('keydown', (e) => {
        if (e.altKey && e.key.toLowerCase() === 's') {
          e.preventDefault();
          captureScreenshotFromMain();
        }
        // 按ESC取消操作
        if (e.key === 'Escape' && (isLoading || isSelecting)) {
          e.preventDefault();
          cancelScreenshot();
        }
      });

      // 绑定按钮点击事件
      screenshotBtn.addEventListener('click', captureScreenshotFromMain);
      errorClose.addEventListener('click', clearError);
    </script>
  </body>
</html>
